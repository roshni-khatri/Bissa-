<html lang="en">

    <style>
        /* --- General Reset & Styles --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background-color: #ffe6f2; /* Very light pink background */
            color: #555;
        }

        h1, h2, h3 {
            font-family: 'Fredoka', sans-serif; /* Bubbly font */

        /* --- Header / Navigation --- */
        header {
            background-color: #fff0f6;
            padding: 20px;

            box-shadow: 0 4px 15px rgba(255, 77, 136, 0.1);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 2px 2px 0px #ffb3d9;
        }

        nav ul {
            list-style: none;
            margin-top: 15px;
        }

        nav ul li {
            display: inline;
            margin: 0 15px;
        }

        nav a {
            text-decoration: none;
            color: #ff4d88;
            font-weight: 600;
            font-size: 1.1rem;
            transition: color 0.3s;
        }

        nav a:hover {
            color: #ff80b3;
        }

        .hero {
            text-align: center;
            padding: 80px 20px;
            background: linear-gradient(180deg, #fff0f6 0%, #ffe6f2 100%);
        }

        .hero h1 {
            font-size: 3rem;
            margin-bottom: 15px;
        }

            padding: 20px 40px;

            margin-top: 20px;
            box-shadow: 5px 5px 0px #ffb3d9;
        }

        .bio-text {
            font-size: 1.2rem;
            color: #ff4d88;
            font-weight: 600;
        }

            margin: 0 auto;
        }

        .section-title {

            font-size: 2.5rem;
            margin-bottom: 40px;
